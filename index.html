<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CASTILLO 💜 ULTRA</title>

<style>

body {
    margin: 0;
    font-family: Arial;
    background: black;
    color: white;
    overflow: hidden;
}

/* PANTALLAS */
.screen {
    width: 100vw;
    height: 100vh;
    position: absolute;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    transition: 0.5s;
}

/* NEON */
.neon {
    font-size: 3em;
    text-shadow: 0 0 10px #ff00ff, 0 0 20px #00ffff;
}

/* BOTONES */
button {
    padding: 15px;
    margin: 10px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(45deg,#ff00ff,#00ffff);
    color: white;
    font-size: 16px;
}

/* SWIPE */
#screen2 {top: 100%;}
#screen3 {top: 200%;}
#screen4 {top: 300%;}

/* JUEGO */
.heart {
    position: absolute;
    font-size: 30px;
    animation: fall linear;
}

@keyframes fall {
    from {top:-10%;}
    to {top:110%;}
}

/* GALERIA */
img {
    width: 150px;
    margin: 10px;
    border-radius: 10px;
}

</style>
</head>

<body>

<!-- SCREEN 1 -->
<div class="screen" id="screen1">
    <h1 class="neon">CASTILLO 💜</h1>
    <button onclick="next()">INICIAR</button>
</div>

<!-- SCREEN 2 -->
<div class="screen" id="screen2">
    <h2>¿Cómo eres? 😏</h2>
    <button onclick="msg('futbol')">⚽</button>
    <button onclick="msg('divertida')">😂</button>
    <button onclick="msg('enojona')">😡</button>
    <p id="texto"></p>
    <button onclick="next()">SIGUIENTE</button>
</div>

<!-- SCREEN 3 JUEGO -->
<div class="screen" id="screen3">
    <h2>🎮 ATRAPA 💜</h2>
    <p>Puntos: <span id="score">0</span></p>
    <button onclick="startGame()">JUGAR</button>
    <button onclick="next()">SIGUIENTE</button>
</div>

<!-- SCREEN 4 GALERIA -->
<div class="screen" id="screen4">
    <h2>📸 RECUERDOS</h2>

    <img src="miko1.png">
    <img src="miko2.png">
    <img src="miko3.png">
    <img src="miko4.png">


    <button onclick="playVoice()">🎤 ESCUCHAR</button>
    <button onclick="final()">FINAL</button>
</div>

<!-- FINAL -->
<div class="screen" id="screen5" style="top:400%">
    <h1 class="neon">💜 CASTILLO 💜</h1>
    <p id="finalText"></p>
</div>

<audio id="voz" src="voz.mp3"></audio>

<script>

let current = 0;
let score = 0;

/* SWIPE SIMULADO */
function next(){
    current++;
    document.body.style.transform = "translateY(-"+(current*100)+"vh)";
}

/* MENSAJES */
function msg(tipo){
    let t = "";

    if(tipo=="futbol") t="⚽ América hasta la muerte 🔥";
    if(tipo=="divertida") t="😂 TikTokera profesional 💃";
    if(tipo=="enojona") t="😡 pero así eres única 😎";

    document.getElementById("texto").innerText = t;
}

/* JUEGO PRO */
function startGame(){
    score = 0;
    document.getElementById("score").innerText = score;

    for(let i=0;i<15;i++){
        let h = document.createElement("div");
        h.classList.add("heart");
        h.innerText="💜";

        h.style.left = Math.random()*100+"%";
        h.style.animationDuration = (Math.random()*3+2)+"s";

        h.onclick = ()=>{
            score++;
            document.getElementById("score").innerText = score;
            h.remove();
        };

        document.body.appendChild(h);

        setTimeout(()=>h.remove(),5000);
    }
}

/* VOZ */
function playVoice(){
    document.getElementById("voz").play();
}

/* FINAL CINEMATICO */
function final(){
    next();

    document.getElementById("finalText").innerText =
    "Feliz cumpleaños 💜\n\nCASTILLO\n\nNo eres de abrazos...\npero eres de las personas más importantes en mi vida.\n\nGracias por todo.\n\nTe quiero un chingo 😎🔥";
}

</script>

</body>
</html>
