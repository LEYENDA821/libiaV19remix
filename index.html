<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡HB Castillo! 19</title>
    <style>
        :root {
            --miko-pink: #ff69b4;
            --rayados-blue: #002d5d;
            --white: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #000 0%, var(--rayados-blue) 100%);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            padding: 20px;
            max-width: 400px;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px var(--miko-pink);
        }

        .nickname {
            font-size: 1.5rem;
            color: var(--miko-pink);
            font-weight: bold;
            letter-spacing: 2px;
        }

        .photo-frame {
            width: 250px;
            height: 250px;
            margin: 20px auto;
            border: 4px solid var(--white);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(255, 105, 180, 0.5);
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .message {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 15px;
            backdrop-filter: blur(5px);
            margin: 20px 0;
            line-height: 1.6;
        }

        .music-player {
            background: var(--white);
            color: #000;
            padding: 15px 30px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: transform 0.3s;
            border: none;
            margin-bottom: 30px;
        }

        .music-player:active {
            transform: scale(0.9);
        }

        .katty-section {
            font-size: 0.9rem;
            color: #ddd;
            font-style: italic;
        }

        .football-icon {
            font-size: 2rem;
            margin-top: 10px;
        }

    </style>
</head>
<body>

    <div class="container">
        <p class="nickname">¡FELICES 19, CASTILLO!</p>
        <h1>⚽️🔥</h1>
        
        <div class="photo-frame">
            <img src="https://itp-imagestorage.s3.amazonaws.com/katty_killer.jpg" alt="Katty Killer">
        </div>

        <div class="message">
            <p>Hoy se celebra a la mejor futbolista de la familia. Que este año sea modo <b>Katty Killer</b>: puro gol y puro éxito.</p>
            <p>Disfruta tus 19 al ritmo de la Miko. ¡Te quiero mucho!</p>
        </div>

        <button class="music-player" onclick="toggleMusic()">
            <span id="icon">▶️</span> <span id="text">DARLE PLAY (Miko Vibes)</span>
        </button>

        <div class="katty-section">
            <p>Enamorada de la 10 de Rayadas 💙🤍</p>
        </div>

        <audio id="bdaySong" loop>
            <source src="TU_LINK_DE_MUSICA_AQUI.mp3" type="audio/mpeg">
        </audio>
    </div>

    <script>
        const audio = document.getElementById('bdaySong');
        const icon = document.getElementById('icon');
        const text = document.getElementById('text');

        function toggleMusic() {
            if (audio.paused) {
                audio.play();
                icon.innerText = "⏸️";
                text.innerText = "SINTIENDO EL FLOW";
            } else {
                audio.pause();
                icon.innerText = "▶️";
                text.innerText = "DARLE PLAY";
            }
        }
    </script>
</body>
</html>
