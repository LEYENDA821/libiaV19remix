<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Castillo 19 - The Season</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --miko-pink: #ff007f;
            --rayados-blue: #002d5d;
            --accent: #00d4ff;
            --bg: #0a0a0a;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: var(--bg);
            color: white;
            font-family: 'Helvetica Neue', sans-serif;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* Fondo de Estrellas/Partículas */
        #canvas-bg {
            position: fixed;
            top: 0; left: 0;
            z-index: -1;
        }

        .main-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            min-height: 100vh;
        }

        /* Header con Estilo */
        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 3.5rem;
            margin: 0;
            background: linear-gradient(to right, var(--miko-pink), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: -2px;
        }

        .badge {
            background: var(--rayados-blue);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            border: 1px solid var(--accent);
            margin-top: 10px;
            display: inline-block;
        }

        /* Player de Música Custom */
        .player-container {
            width: 90%;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin: 20px 0;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .play-btn {
            width: 60px; height: 60px;
            border-radius: 50%;
            border: none;
            background: var(--miko-pink);
            color: white;
            font-size: 1.5rem;
            box-shadow: 0 0 20px var(--miko-pink);
        }

        .bars {
            display: flex;
            gap: 3px;
            height: 20px;
            align-items: flex-end;
        }

        .bar {
            width: 4px;
            background: var(--accent);
            height: 20%;
        }

        /* La Tarjeta de Katty */
        .katty-card {
            position: relative;
            width: 100%;
            max-width: 320px;
            height: 450px;
            border-radius: 20px;
            overflow: hidden;
            margin: 30px 0;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            transition: transform 0.5s;
        }

        .katty-card img {
            width: 100%; height: 100%;
            object-fit: cover;
        }

        .katty-overlay {
            position: absolute;
            bottom: 0;
            width: 100%;
            padding: 20px;
            background: linear-gradient(transparent, var(--rayados-blue));
            box-sizing: border-box;
        }

        /* Animaciones */
        @keyframes dance {
            0%, 100% { height: 20%; }
            50% { height: 100%; }
        }

        .playing .bar { animation: dance 0.6s infinite ease-in-out; }
        .bar:nth-child(2) { animation-delay: 0.1s; }
        .bar:nth-child(3) { animation-delay: 0.2s; }
        .bar:nth-child(4) { animation-delay: 0.3s; }

    </style>
</head>
<body>

    <canvas id="canvas-bg"></canvas>

    <div class="main-content">
        <div class="header">
            <div class="badge">SEASON 19 • CASTILLO</div>
