<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CASTILLO 💜 ULTRA</title>
    <style>
        :root {
            --primary: #ff00ff;
            --secondary: #00ffff;
            --bg: #0a0a0a;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: white;
            overflow: hidden; /* Evita scroll no deseado */
        }

        /* Contenedor Principal para el Swipe */
        #main-view {
            height: 100vh;
            transition: transform 0.6s cubic-bezier(0.65, 0, 0.35, 1);
        }

        .screen {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Estilos de Texto */
        .neon {
            font-size: 3.5rem;
            font-weight: bold;
            text-transform: uppercase;
            color: #fff;
            text-shadow: 0 0 10px var(--primary), 0 0 20px var(--secondary);
            margin-bottom: 20px;
        }

        h2 { font-size: 1.8rem; margin-bottom: 20px; }

        /* Botones Mejorados */
        button {
            padding: 15px 30px;
            margin: 10px;
            border: none;
            border-radius: 50px;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(255, 0, 255, 0.3);
        }

        button:active { transform: scale(0.95); }

        /* Juego */
        .heart {
            position: absolute;
            font-size: 40px;
            cursor: pointer;
            user-select: none;
            z-index: 10;
            filter: drop-shadow(0 0 5px var(--primary));
        }

        @keyframes fall {
            from { transform: translateY(-10vh) rotate(0deg); }
            to { transform: translateY(110vh) rotate(360deg); }
        }

        /* Galería Responsiva */
        .gallery {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            max-width: 400px;
            margin-bottom: 20px;
        }

        .gallery img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 15px;
            border: 2px solid var(--secondary);
        }

        #texto-dinamico {
            height: 30px;
            margin: 15px 0;
            font-style: italic;
            color: var(--secondary);
        }

    </style>
</head>
<body>

<div id="main-view">
    <section class="screen">
        <h1 class="neon">CASTILLO 💜</h1>
        <button onclick="next(1)">ENTRAR AQUÍ</button>
    </section>

    <section class="screen">
        <h2>¿Cómo te sientes hoy? 😏</h2>
        <div>
            <button onclick="msg('futbol')">⚽</button>
            <button onclick="msg('divertida')">😂</button>
            <button onclick="msg('enojona')">😡</button>
        </div>
        <p id="texto-dinamico"></p>
        <button onclick="next(2)" style="background: none; border: 1px solid white;">SIGUIENTE</button>
    </section>

    <section class="screen">
        <h2>🎮 ATRAPA LOS 💜</h2>
        <p>Puntos: <span id="score">0</span></p>
        <div id="game-container" style="height: 50px;">
             <button id="start-btn" onclick="startGame()">¡JUGAR!</button>
        </div>
        <button onclick="next(3)" id="next-game" style="display:none">CONTINUAR</button>
    </section>

    <section class="screen">
        <h2>📸 RECUERDOS</h2>
        <div class="gallery">
            <img src="miko1.png" alt="Recuerdo 1">
            <img src="miko2.png" alt="Recuerdo 2">
            <img src="miko3.png" alt="Recuerdo 3">
            <img src="miko4.png" alt="Recuerdo 4">
        </div>
        <button onclick="playVoice()">🎤 ESCUCHAR MENSAJE</button>
        <button onclick="final()">FINALIZAR</button>
    </section>

    <section class="screen">
        <h1 class="neon">PARA TI 💜</h1>
        <p id="finalText" style="white-space: pre-line; line-height: 1.6; padding: 0 20px;"></p>
    </section>
</div>

<audio id="voz" src="mikoWassup.mp3"></audio>

<script>
    let score = 0;
    const mainView = document.getElementById('main-view');

    function next(index) {
        mainView.style.transform = `translateY(-${index * 100}vh)`;
    }

    function msg(tipo) {
        const t = {
            'futbol': "⚽ ¡Eso! América hasta la muerte 🔥",
            'divertida': "😂 La más TikTokera y divertida 💃",
            'enojona': "😡 Ni aguantas nada... ¡pero así te quiero! 😎"
        };
        document.getElementById("texto-dinamico").innerText = t[tipo];
    }

    function startGame() {
        score = 0;
        document.getElementById("score").innerText = score;
        document.getElementById("start-btn").style.display = "none";
        
        let timeLeft = 10; // 10 segundos de juego
        
        const gameInterval = setInterval(() => {
            createHeart();
        }, 400);

        setTimeout(() => {
            clearInterval(gameInterval);
            document.getElementById("next-game").style.display = "block";
        }, 10000);
    }

    function createHeart() {
        const h = document.createElement("div");
        h.classList.add("heart");
        h.innerText = "💜";
        h.style.left = Math.random() * 90 + "vw";
        h.style.top = "-50px";
        h.style.animation = `fall ${Math.random() * 2 + 2}s linear forwards`;

        h.onclick = () => {
            score++;
            document.getElementById("score").innerText = score;
            h.remove();
        };

        document.body.appendChild(h);
        setTimeout(() => h.remove(), 4000);
    }

    function playVoice() {
        const audio = document.getElementById("voz");
        audio.play().catch(e => alert("Dale play de nuevo para escuchar"));
    }

    function final() {
        next(4);
        const txt = "¡Feliz Cumpleaños!\n\nCASTILLO\n\nTal vez no seas de muchos abrazos...\npero eres de las personas más importantes en mi vida.\n\nGracias por ser tú.\n\nTe quiero un chingo 😎🔥";
        
        // Efecto de escritura simple
        let i = 0;
        const target = document.getElementById("finalText");
        target.innerText = "";
        
        function typing() {
            if (i < txt.length) {
                target.innerText += txt.charAt(i);
                i++;
                setTimeout(typing, 50);
            }
        }
        typing();
    }
</script>

</body>
</html>
