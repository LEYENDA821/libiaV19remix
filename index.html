<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HAPPY BIRTHDAY 19 💜 CASTILLO</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Nixie+One&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-neon: #bc13fe;
            --secondary-neon: #00ffff;
            --text-color: #ffffff;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            /* Fondo de galaxia oscuro y profundo */
            background-color: #000;
            background-image: 
                radial-gradient(circle at center, rgba(30, 0, 60, 0.6) 0%, rgba(0, 0, 0, 1) 70%),
                url('https://images.unsplash.com/photo-1506318137071-a8e063b4bcc0?q=80&w=1920'); /* Imagen de galaxia pública */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-color);
            font-family: 'Arial', sans-serif; /* Fuente por defecto */
            overflow: hidden; /* Bloquea el scroll manual */
            width: 100vw;
            height: 100vh;
        }

        /* SISTEMA DE PANTALLAS (Fixed para que no se corte en móviles) */
        .screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
            transform: translateY(100%); /* Todas ocultas abajo */
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            /* Mantenemos el fondo transparente para ver la galaxia */
            background: transparent; 
            z-index: 10;
        }

        .screen.active {
            transform: translateY(0); /* La pantalla activa sube */
            z-index: 20;
        }

        /* EFECTOS VISUALES MEJORADOS (Estilo Neón Vibrante) */
        .neon-title {
            font-family: 'Nixie One', cursive; /* Fuente neón más estilizada */
            font-size: 3rem;
            text-transform: uppercase;
            color: #fff;
            /* Neón doble: Cian y Magenta */
            text-shadow: 
                0 0 7px #fff,
                0 0 10px #fff,
                0 0 21px var(--secondary-neon),
                0 0 42px var(--secondary-neon),
                0 0 82px var(--secondary-neon),
                0 0 92px var(--secondary-neon),
                0 0 102px var(--secondary-neon),
                0 0 151px var(--primary-neon);
            margin-bottom: 20px;
        }

        .neon-subtitle {
            font-family: 'Nixie One', cursive;
            font-size: 2.2rem;
            color: #fff;
            text-shadow: 
                0 0 7px #fff,
                0 0 10px var(--secondary-neon),
                0 0 21px var(--secondary-neon),
                0 0 42px var(--secondary-neon);
            margin-bottom: 30px;
        }

        /* Estilo para el texto manuscrito (más vida) */
        .script-text {
            font-family: 'Dancing Script', cursive;
            font-size: 1.5rem;
            line-height: 1.6;
            margin-bottom: 15px;
            color: #f0f0f0;
        }

        /* BOTONES MEJORADOS */
        button {
            padding: 15px 30px;
            margin: 10px;
            border: none;
            border-radius: 50px; /* Bordes más redondeados */
            background: linear-gradient(45deg, var(--primary-neon), var(--secondary-neon));
            color: white;
            font-weight: bold;
            font-size: 1rem;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(188, 19, 254, 0.6);
            transition: all 0.3s ease;
        }

        button:hover {
            box-shadow: 0 6px 20px rgba(0, 255, 255, 0.8);
            transform: translateY(-2px);
        }

        button:active { transform: scale(0.95); }

        /* GALERÍA */
        .gallery {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 30px;
            max-width: 320px;
        }

        .gallery img {
            width: 100%;
            height: 140px;
            object-fit: cover;
            border-radius: 15px;
            border: 3px solid var(--secondary-neon);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
            transition: transform 0.3s ease;
        }

        .gallery img:hover {
            transform: scale(1.05);
        }

        /* JUEGO */
        .heart {
            position: absolute;
            font-size: 40px;
            z-index: 100;
            cursor: pointer;
            animation: fall 3s linear forwards;
            filter: drop-shadow(0 0 10px var(--primary-neon));
        }

        @keyframes fall {
            from { top: -10%; transform: translateX(0) rotate(0deg); }
            to { top: 110%; transform: translateX(20px) rotate(360deg); }
        }

        #msg-display {
            height: 40px;
            color: var(--secondary-neon);
            font-weight: bold;
            font-size: 1.2rem;
            margin: 20px 0;
            text-shadow: 0 0 10px var(--secondary-neon);
        }
    </style>
</head>
<body>

    <div class="screen active" id="s0">
        <h1 class="neon-title">CASTILLO 💜</h1>
        <button onclick="goTo(1)">ENTRAR AQUÍ</button>
    </div>

    <div class="screen" id="s1">
        <h2 class="script-text" style="font-size: 2rem;">¿Cómo andas hoy? 😏</h2>
        <div>
            <button onclick="setMsg('⚽ América hasta la muerte 🔥')">⚽</button>
            <button onclick="setMsg('😂 TikTokera profesional 💃')">😂</button>
            <button onclick="setMsg('😡 Pero así eres única 😎')">😡</button>
        </div>
        <p id="msg-display"></p>
        <button onclick="goTo(2)" style="background: none; border: 2px solid #fff; box-shadow: none;">SIGUIENTE</button>
    </div>

    <div class="screen" id="s2">
        <h2 class="neon-subtitle">🎮 ATRAPA LOS 💜</h2>
        <p class="script-text">Puntos: <span id="score" style="font-size: 2rem; color: var(--secondary-neon);">0</span></p>
        <button id="play-btn" onclick="startHearts()">¡JUGAR!</button>
        <button onclick="goTo(3)" style="background: none; border: 2px solid #fff; box-shadow: none;">SIGUIENTE</button>
    </div>

    <div class="screen" id="s3">
        <h2 class="neon-subtitle">📸 RECUERDOS</h2>
        <div class="gallery">
            <img src="miko1.png" onerror="this.src='https://via.placeholder.com/150/bc13fe/ffffff?text=FOTO+1'">
            <img src="miko2.png" onerror="this.src='https://via.placeholder.com/150/00ffff/000000?text=FOTO+2'">
            <img src="miko3.png" onerror="this.src='https://via.placeholder.com/150/ffffff/bc13fe?text=FOTO+3'">
            <img src="miko4.png" onerror="this.src='https://via.placeholder.com/150/bc13fe/000000?text=FOTO+4'">
        </div>
        <button onclick="playAudio()">🎤 ESCUCHAR</button>
        <button onclick="finalSequence()">FINAL</button>
    </div>

    <div class="screen" id="s4">
        <h1 class="neon-title">PARA TI 💜</h1>
        <div id="final-content" style="max-width: 600px; padding: 0 20px;"></div>
    </div>

    <audio id="audio" src="mikoWassup.mp3"></audio>

<script>
    // Navegación entre pantallas
    function goTo(index) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('s' + index).classList.add('active');
    }

    // Mensajes de la pantalla 2
    function setMsg(txt) {
        document.getElementById('msg-display').innerText = txt;
    }

    // Lógica del juego de corazones
    let score = 0;
    function startHearts() {
        document.getElementById('play-btn').style.display = 'none';
        let count = 0;
        const game = setInterval(() => {
            const h = document.createElement('div');
            h.className = 'heart';
            h.innerText = '💜';
            // Posición aleatoria
            h.style.left = Math.random() * 80 + 10 + '%';
            // Duración aleatoria para que caigan a distinta velocidad
            h.style.animationDuration = (Math.random() * 2 + 2) + 's';
            
            h.onclick = () => { 
                score++; 
                document.getElementById('score').innerText = score; 
                h.remove(); 
            };
            
            document.body.appendChild(h);
            count++;
            if(count > 30) clearInterval(game); // Caen 30 corazones
            setTimeout(() => h.remove(), 4000); // Se eliminan si no se tocan
        }, 300);
    }

    // Reproducir audio
    function playAudio() {
        const a = document.getElementById('audio');
        a.play().catch(() => alert("¡Dale otra vez al botón para escuchar el mensaje!"));
    }

    // Secuencia final con efecto de escritura y estilos aplicados
    function finalSequence() {
        goTo(4);
        
        const finalContent = document.getElementById('final-content');
        finalContent.innerHTML = ""; // Limpiamos contenido previo

        // Definimos las partes del texto con sus clases
        const textParts = [
            { text: "Feliz cumpleaños 💜\n\n", class: "script-text" },
            { text: "CASTILLO\n\n", class: "neon-subtitle" },
            { text: "No eres de abrazos...\npero eres de las personas más importantes en mi vida.\n\n", class: "script-text" },
            { text: "Gracias por todo.\n\n", class: "script-text" },
            { text: "Te quiero un chingo 😎🔥", class: "script-text", style: "font-size: 1.8rem;" }
        ];

        let partIndex = 0;
        let charIndex = 0;

        function type() {
            if (partIndex < textParts.length) {
                const currentPart = textParts[partIndex];
                
                // Si es el primer carácter de la parte, creamos el elemento
                if (charIndex === 0) {
                    const newEl = document.createElement('p');
                    newEl.className = currentPart.class;
                    if (currentPart.style) newEl.style = currentPart.style;
                    newEl.style.whiteSpace = "pre-line"; // Para respetar los saltos de línea
                    finalContent.appendChild(newEl);
                }

                // Añadimos el carácter al último elemento creado
                finalContent.lastChild.innerText += currentPart.text.charAt(charIndex);
                charIndex++;

                // Si terminamos la parte actual, pasamos a la siguiente
                if (charIndex >= currentPart.text.length) {
                    partIndex++;
                    charIndex = 0;
                    setTimeout(type, 200); // Pausa más larga entre partes
                } else {
                    setTimeout(type, 50); // Velocidad de escritura
                }
            }
        }
        
        // Empezamos a escribir después de un pequeño delay
        setTimeout(type, 800);
    }
</script>
</body>
</html>
