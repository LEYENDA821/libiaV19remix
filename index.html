<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CASTILLO 💜 ULTRA</title>
    <style>
        :root {
            --primary: #ff00ff;
            --secondary: #00ffff;
            --dark: #000000;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Evita scroll manual */
            background-color: var(--dark);
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        /* Contenedor que limita la vista */
        #viewport {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Lienzo largo que se mueve */
        #canvas {
            width: 100%;
            height: 500vh; /* 5 pantallas */
            transition: transform 0.7s cubic-bezier(0.6, 0.1, 0.3, 1);
            display: flex;
            flex-direction: column;
        }

        .screen {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .neon {
            font-size: 3rem;
            color: #fff;
            text-shadow: 0 0 10px var(--primary), 0 0 20px var(--secondary);
            margin-bottom: 20px;
        }

        button {
            padding: 15px 30px;
            margin: 10px;
            border-radius: 50px;
            border: none;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            z-index: 100; /* Siempre encima */
        }

        button:active { transform: scale(0.9); }

        .heart {
            position: absolute;
            font-size: 35px;
            cursor: pointer;
            z-index: 50;
            user-select: none;
            animation: fall linear forwards;
        }

        @keyframes fall {
            from { top: -10%; transform: rotate(0deg); }
            to { top: 110%; transform: rotate(360deg); }
        }

        img {
            width: 140px;
            height: 140px;
            object-fit: cover;
            margin: 5px;
            border-radius: 15px;
            border: 2px solid var(--secondary);
        }

        #msg-output {
            margin: 20px;
            height: 25px;
            color: var(--secondary);
            font-weight: bold;
        }
    </style>
</head>
<body>

<div id="viewport">
    <div id="canvas">
        
        <section class="screen">
            <h1 class="neon">CASTILLO 💜</h1>
            <button onclick="move(1)">INICIAR</button>
        </section>

        <section class="screen">
            <h2>¿Cómo eres hoy? 😏</h2>
            <div>
                <button onclick="showMsg('futbol')">⚽</button>
                <button onclick="showMsg('fun')">😂</button>
                <button onclick="showMsg('mad')">😡</button>
            </div>
            <p id="msg-output"></p>
            <button onclick="move(2)">SIGUIENTE</button>
        </section>

        <section class="screen">
            <h2>🎮 ATRAPA LOS 💜</h2>
            <p>Puntos: <span id="score">0</span></p>
            <button id="btn-play" onclick="spawnHearts()">JUGAR</button>
            <button onclick="move(3)">SIGUIENTE</button>
        </section>

        <section class="screen">
            <h2>📸 RECUERDOS</h2>
            <div style="display: flex; flex-wrap: wrap; justify-content: center;">
                <img src="miko1.png" onerror="this.src='https://via.placeholder.com/150?text=Foto+1'">
                <img src="miko2-png" onerror="this.src='https://via.placeholder.com/150?text=Foto+2'">
                <img src="miko3.png" onerror="this.src='https://via.placeholder.com/150?text=Foto+3'">
            </div>
            <button onclick="document.getElementById('voz').play()">🎤 ESCUCHAR</button>
            <button onclick="showFinal()">FINAL</button>
        </section>

        <section class="screen">
            <h1 class="neon">PARA TI 💜</h1>
            <p id="final-text" style="white-space: pre-line; font-size: 1.2rem;"></p>
        </section>

    </div>
</div>

<audio id="voz" src="mikoWassup.mp3"></audio>

<script>
    const canvas = document.getElementById('canvas');
    let score = 0;

    function move(index) {
        canvas.style.transform = `translateY(-${index * 100}vh)`;
    }

    function showMsg(type) {
        const out = document.getElementById('msg-output');
        if(type === 'futbol') out.innerText = "⚽ América hasta la muerte 🔥";
        if(type === 'fun') out.innerText = "😂 TikTokera profesional 💃";
        if(type === 'mad') out.innerText = "😡 ¡Pero así eres única! 😎";
    }

    function spawnHearts() {
        document.getElementById('btn-play').style.display = 'none';
        let count = 0;
        const interval = setInterval(() => {
            const h = document.createElement("div");
            h.classList.add("heart");
            h.innerText = "💜";
            h.style.left = Math.random() * 85 + "vw";
            h.style.animationDuration = (Math.random() * 2 + 2) + "s";
            
            h.onclick = () => {
                score++;
                document.getElementById("score").innerText = score;
                h.remove();
            };

            document.body.appendChild(h);
            count++;
            if(count > 20) clearInterval(interval);
            setTimeout(() => h.remove(), 4000);
        }, 400);
    }

    function showFinal() {
        move(4);
        const text = "Feliz cumpleaños 💜\n\nCASTILLO\n\nNo eres de abrazos...\npero eres de las personas más importantes en mi vida.\n\nGracias por todo.\n\nTe quiero un chingo 😎🔥";
        let i = 0;
        const target = document.getElementById('final-text');
        
        function typing() {
            if (i < text.length) {
                target.innerText += text.charAt(i);
                i++;
                setTimeout(typing, 50);
            }
        }
        typing();
    }
</script>

</body>
</html>
