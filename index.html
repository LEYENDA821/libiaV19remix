<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PARA TI 💜 CASTILLO</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-neon: #bc13fe;
            --secondary-neon: #00ffff;
            --text-color: #ffffff;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: var(--text-color);
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        .background-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('miko1.png');
            background-size: cover;
            background-position: center;
            filter: blur(10px) brightness(0.3);
            transform: scale(1.1);
            z-index: -1;
        }

        .screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            text-align: center;
            transform: translateY(100%);
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10;
        }

        .screen.active {
            transform: translateY(0);
            z-index: 20;
        }

        .neon-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 3.5rem;
            letter-spacing: 5px;
            color: #fff;
            text-shadow: 0 0 10px var(--primary-neon), 0 0 20px var(--secondary-neon);
            margin-bottom: 20px;
        }

        .final-message-style {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            line-height: 1.6;
            color: #ffffff;
            word-spacing: 4px; 
            letter-spacing: 0.5px;
            white-space: pre-wrap;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }

        .engineer-footer {
            margin-top: 30px;
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid var(--secondary-neon);
            padding: 15px;
            border-radius: 10px;
            font-family: 'Fira Code', monospace;
            font-size: 0.8rem;
            color: var(--secondary-neon);
            max-width: 90%;
        }

        .ig-link {
            display: block;
            margin-top: 10px;
            color: #fff;
            background: #e1306c; 
            padding: 8px 15px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            font-family: 'Montserrat', sans-serif;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(225, 48, 108, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(225, 48, 108, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(225, 48, 108, 0); }
        }

        button {
            padding: 16px 32px;
            margin: 10px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(45deg, var(--primary-neon), var(--secondary-neon));
            color: white;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(188, 19, 254, 0.5);
        }

        .gallery img {
            width: 100px; height: 100px;
            object-fit: cover;
            border-radius: 10px;
            border: 2px solid var(--secondary-neon);
            margin: 5px;
        }

        .heart { position: absolute; font-size: 40px; z-index: 100; animation: fall 3s linear forwards; }
        @keyframes fall { from { top: -10%; } to { top: 110%; } }
    </style>
</head>
<body>

    <div class="background-overlay"></div>

    <div class="screen active" id="s0">
        <h1 class="neon-title">CASTILLO 💜</h1>
        <button onclick="iniciarTodo()">EMPEZAR</button>
    </div>

    <div class="screen" id="s1">
        <h2 style="font-family:'Bebas Neue'; font-size: 2.5rem;">¿Cómo va el mood? 😏</h2>
        <div>
            <button onclick="setMsg('⚽ ¡América hasta la muerte! 🔥')">⚽</button>
            <button onclick="setMsg('😂 TikTokera nivel pro 💃')">😂</button>
            <button onclick="setMsg('😡 Pero así te quiero 😜')">😡</button>
        </div>
        <p id="msg-display" style="font-weight:700; color:var(--secondary-neon); height:30px; margin:20px 0;"></p>
        <button onclick="goTo(2)" style="background:none; border: 1px solid white;">SIGUIENTE</button>
    </div>

    <div class="screen" id="s2">
        <h2 style="font-family:'Bebas Neue'; font-size: 2.5rem;">🎮 ATRAPA LOS 💜</h2>
        <p>Puntos: <span id="score" style="color:var(--secondary-neon); font-size:1.5rem; font-weight:700;">0</span></p>
        <button id="play-btn" onclick="startHearts()">JUGAR</button>
        <button onclick="goTo(3)" style="background:none; border: 1px solid white;">CONTINUAR</button>
    </div>

    <div class="screen" id="s3">
        <h2 style="font-family:'Bebas Neue'; font-size: 2.5rem;">📸 RECUERDOS</h2>
        <div class="gallery">
            <img src="miko2.png" onerror="this.src='https://via.placeholder.com/150/bc13fe/ffffff?text=FOTO+1'">
            <img src="miko3.png" onerror="this.src='https://via.placeholder.com/150/00ffff/000000?text=FOTO+2'">
            <img src="miko4.png" onerror="this.src='https://via.placeholder.com/150/ffffff/bc13fe?text=FOTO+3'">
        </div>
        <button onclick="reproducirVoz()">🎤 ESCUCHAR</button>
        <button onclick="finalSequence()">LO ÚLTIMO</button>
    </div>

    <div class="screen" id="s4">
        <h1 class="neon-title" style="font-size: 2.5rem;">PARA TI 💜</h1>
        <div id="final-content" class="final-message-style"></div>
        
        <div class="engineer-footer" id="dev-block" style="display:none;">
            <div>> STATUS: Cumpleaños optimizado al 100%</div>
            <div>> DEV: El mejor hermano (Ing. en Sistemas)</div>
            <div>> INFO: Si te gustó la página, el creador está disponible.</div>
            <a href="https://instagram.com/aaleex.castillo" target="_blank" class="ig-link">
                📸 Sigue al Ing: @aaleex.castillo
            </a>
        </div>
    </div>

    <audio id="mananitas" src="mananitas.mp3" loop></audio>
    <audio id="audioVoz" src="mikoWassup.mp3"></audio>

<script>
    function goTo(index) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('s' + index).classList.add('active');
    }

    function iniciarTodo() {
        // Reproduce las mañanitas al entrar
        document.getElementById('mananitas').play();
        goTo(1);
    }

    function reproducirVoz() {
        // Pausa las mañanitas para que no se encimen
        const mariachi = document.getElementById('mananitas');
        mariachi.pause();
        mariachi.currentTime = 0; // Reinicia el mariachi por si acaso
        
        // Reproduce el mensaje de voz
        document.getElementById('audioVoz').play();
    }

    function setMsg(txt) { document.getElementById('msg-display').innerText = txt; }

    function startHearts() {
        document.getElementById('play-btn').style.display = 'none';
        let count = 0;
        const game = setInterval(() => {
            const h = document.createElement('div');
            h.className = 'heart'; h.innerText = '💜';
            h.style.left = Math.random() * 80 + 10 + '%';
            h.onclick = () => { h.remove(); document.getElementById('score').innerText = parseInt(document.getElementById('score').innerText)+1; };
            document.body.appendChild(h);
            count++; if(count > 20) clearInterval(game);
            setTimeout(() => h.remove(), 3000);
        }, 400);
    }

    function finalSequence() {
        goTo(4);
        const container = document.getElementById('final-content');
        container.innerHTML = "";

        const fullText = "¡Feliz Cumpleaños! 💜\n\nCASTILLO\n\nSé que no eres de muchos abrazos, pero eres de las personas más importantes en mi vida.\n\nGracias por todo lo compartido.\n\nTe quiero un chingo 😎🔥";

        let i = 0;
        function type() {
            if (i < fullText.length) {
                container.textContent += fullText.charAt(i);
                i++;
                setTimeout(type, 50);
            } else {
                setTimeout(() => {
                    document.getElementById('dev-block').style.display = 'block';
                }, 1000);
            }
        }
        setTimeout(type, 800);
    }
</script>
</body>
</html>
