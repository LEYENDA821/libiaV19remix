<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para la mejor hermana 💙</title>

<style>
body {
    margin: 0;
    font-family: 'Arial', sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
    text-align: center;
    overflow: hidden;
}

.container {
    padding: 30px;
}

h1 {
    font-size: 2.5em;
    animation: fadeIn 2s;
}

button {
    padding: 15px 25px;
    margin: 10px;
    border: none;
    border-radius: 12px;
    background: #00c6ff;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
    background: #0072ff;
}

.hidden {
    display: none;
}

.card {
    margin-top: 20px;
    padding: 20px;
    border-radius: 15px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    animation: pop 0.5s;
}

@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}

@keyframes pop {
    from {transform: scale(0.5);}
    to {transform: scale(1);}
    .tiktok {
    position: absolute;
    width: 100%;
    height: 100%;
    pointer-events: none;
}

.circle {
    position: absolute;
    border-radius: 50%;
    animation: float 5s infinite;
}

@keyframes float {
    0% {transform: translateY(0);}
    50% {transform: translateY(-50px);}
    100% {transform: translateY(0);}
}
</style>
</head>

<body>

<div class="container">

<h1>🎉 Para mi hermana favorita 🎉</h1>

<p>Presiona para empezar tu experiencia 😏👇</p>

<button onclick="start()">INICIAR</button>

<div id="game" class="hidden">

    <h2>Escoge una opción 👇</h2>

    <button onclick="option1()">⚽ Futbolera</button>
    <button onclick="option2()">😂 Divertida</button>
    <button onclick="option3()">😡 Enojona</button>

</div>

<div id="result" class="card hidden"></div>

<div id="final" class="hidden">
    <h2>🎁 Desbloqueaste algo especial...</h2>
    <p id="mensajeFinal"></p>
</div>

</div>

<audio id="music" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

<script>

let clicks = 0;

function start() {
    document.getElementById("game").classList.remove("hidden");
    document.getElementById("music").play();
}

function option1() {
    showMessage("⚽ Obvio... fan del América 😎🔥\nEres intensa pero crack 💙");
}

function option2() {
    showMessage("😂 La más divertida... aunque te pases a veces 🤣");
}

function option3() {
    showMessage("😡 Enojona... pero te queremos así 💀");
}

function showMessage(text) {
    clicks++;

    let result = document.getElementById("result");
    result.innerText = text;
    result.classList.remove("hidden");

    createEffect();

    if(clicks >= 3){
        unlockFinal();
    }
}

function unlockFinal(){
    document.getElementById("final").classList.remove("hidden");

    document.getElementById("mensajeFinal").innerText =
    "Feliz cumpleaños 💙\n\nAunque no seas de abrazos...\nEres de las personas más importantes para mí.\n\nGracias por todo lo que vivimos juntos 🫶\n\nTe quiero un chingo 😎🔥";
}

function createEffect(){
    for(let i=0;i<10;i++){
        let circle = document.createElement("div");
        circle.classList.add("circle");
        circle.style.width = Math.random()*20 + "px";
        circle.style.height = circle.style.width;
        circle.style.background = "rgba(255,255,255,0.3)";
        circle.style.top = Math.random()*100 + "%";
        circle.style.left = Math.random()*100 + "%";

        document.body.appendChild(circle);

        setTimeout(()=>{ circle.remove(); }, 5000);
    }
}

</script>

</body>
</html>
}
