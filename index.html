<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CASTILLO 💜 ULTRA</title>
    <style>
        :root {
            --primary: #bc13fe;
            --secondary: #00ffff;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: white;
            font-family: 'Arial', sans-serif;
            overflow: hidden; /* Bloquea el scroll manual */
            width: 100vw;
            height: 100vh;
        }

        /* SISTEMA DE PANTALLAS */
        .screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
            transform: translateY(100%); /* Todas ocultas abajo */
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            background: #000;
            z-index: 10;
        }

        .screen.active {
            transform: translateY(0); /* La pantalla activa sube */
            z-index: 20;
        }

        /* EFECTOS VISUALES */
        .neon {
            font-size: 2.5rem;
            text-transform: uppercase;
            color: #fff;
            text-shadow: 0 0 10px var(--primary), 0 0 20px var(--secondary);
            margin-bottom: 30px;
        }

        button {
            padding: 15px 25px;
            margin: 10px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(188, 19, 254, 0.4);
        }

        button:active { transform: scale(0.95); }

        /* GALERÍA */
        .gallery {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .gallery img {
            width: 130px;
            height: 130px;
            object-fit: cover;
            border-radius: 10px;
            border: 2px solid var(--primary);
        }

        /* JUEGO */
        .heart {
            position: absolute;
            font-size: 35px;
            z-index: 100;
            cursor: pointer;
            animation: fall 3s linear forwards;
        }

        @keyframes fall {
            from { top: -10%; }
            to { top: 110%; }
        }

        #msg-display {
            height: 30px;
            color: var(--secondary);
            font-weight: bold;
            margin: 15px 0;
        }
    </style>
</head>
<body>

    <div class="screen active" id="s0">
        <h1 class="neon">CASTILLO 💜</h1>
        <button onclick="goTo(1)">INICIAR</button>
    </div>

    <div class="screen" id="s1">
        <h2>¿Cómo andas hoy? 😏</h2>
        <div>
            <button onclick="setMsg('⚽ América hasta la muerte 🔥')">⚽</button>
            <button onclick="setMsg('😂 TikTokera profesional 💃')">😂</button>
            <button onclick="setMsg('😡 Pero así eres única 😎')">😡</button>
        </div>
        <p id="msg-display"></p>
        <button onclick="goTo(2)">SIGUIENTE</button>
    </div>

    <div class="screen" id="s2">
        <h2>🎮 ATRAPA LOS ⚽</h2>
        <p>Puntos: <span id="score">0</span></p>
        <button id="play-btn" onclick="startHearts()">¡JUGAR!</button>
        <button onclick="goTo(3)">SIGUIENTE</button>
    </div>

    <div class="screen" id="s3">
        <h2>📸 RECUERDOS</h2>
        <div class="gallery">
            <img src="miko1.png" onerror="this.src='https://via.placeholder.com/150/bc13fe/ffffff?text=FOTO+1'">
            <img src="miko2.png" onerror="this.src='https://via.placeholder.com/150/00ffff/000000?text=FOTO+2'">
            <img src="miko3.png" onerror="this.src='https://via.placeholder.com/150/ffffff/bc13fe?text=FOTO+3'">
            <img src="miko4.png" onerror="this.src='https://via.placeholder.com/150/bc13fe/000000?text=FOTO+4'">
        </div>
        <button onclick="playAudio()">🎤 ESCUCHAR</button>
        <button onclick="finalSequence()">FINAL</button>
    </div>

    <div class="screen" id="s4">
        <h1 class="neon">PARA TI 💜</h1>
        <p id="final-txt" style="white-space: pre-line; line-height: 1.5; font-size: 1.1rem;"></p>
    </div>

    <audio id="audio" src="mikoWassup.mp3"></audio>

<script>
    function goTo(index) {
        // Quitamos la clase active de todas las pantallas
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        // Se la ponemos a la pantalla objetivo
        document.getElementById('s' + index).classList.add('active');
    }

    function setMsg(txt) {
        document.getElementById('msg-display').innerText = txt;
    }

    let score = 0;
    function startHearts() {
        document.getElementById('play-btn').style.display = 'none';
        let count = 0;
        const game = setInterval(() => {
            const h = document.createElement('div');
            h.className = 'heart';
            h.innerText = '💜';
            h.style.left = Math.random() * 80 + 10 + '%';
            h.onclick = () => { score++; document.getElementById('score').innerText = score; h.remove(); };
            document.body.appendChild(h);
            count++;
            if(count > 25) clearInterval(game);
            setTimeout(() => h.remove(), 3000);
        }, 400);
    }

    function playAudio() {
        const a = document.getElementById('audio');
        a.play().catch(() => alert("¡Dale otra vez al botón para escuchar!"));
    }

    function finalSequence() {
        goTo(4);
        const texto = "Feliz cumpleaños 💜\n\nCASTILLO\n\nNo eres de abrazos...\npero eres de las personas más importantes en mi vida.\n\nGracias por todo.\n\nTe quiero un chingo 😎🔥";
        let i = 0;
        const target = document.getElementById('final-txt');
        target.innerText = "";
        
        function type() {
            if (i < texto.length) {
                target.innerText += texto.charAt(i);
                i++;
                setTimeout(type, 50);
            }
        }
        setTimeout(type, 800);
    }
</script>
</body>
</html>
