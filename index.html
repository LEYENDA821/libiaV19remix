<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PARA TI 💜 CASTILLO</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-neon: #bc13fe;
            --secondary-neon: #00ffff;
            --text-color: #ffffff;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: var(--text-color);
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        /* FONDO CON FOTO DE YOUNG MIKO BORROSA */
        .background-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Imagen de Young Miko - Puedes cambiar el link si tienes una favorita */
            background-image: url('miko1.png');
            background-size: cover;
            background-position: center;
            filter: blur(8px) brightness(0.4);
            transform: scale(1.1); /* Evita bordes blancos por el blur */
            z-index: -1;
        }

        /* PANTALLAS */
        .screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 25px;
            text-align: center;
            transform: translateY(100%);
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            background: transparent; 
            z-index: 10;
        }

        .screen.active {
            transform: translateY(0);
            z-index: 20;
        }

        /* TÍTULOS ESTILO NEÓN */
        .neon-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 4rem;
            letter-spacing: 3px;
            color: #fff;
            text-shadow: 0 0 10px var(--primary-neon), 0 0 20px var(--secondary-neon);
            margin-bottom: 20px;
        }

        .neon-subtitle {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.5rem;
            color: #fff;
            text-shadow: 0 0 10px var(--secondary-neon);
            margin-bottom: 25px;
        }

        /* TEXTO LEGIBLE */
        .readable-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.1rem;
            font-weight: 400;
            line-height: 1.5;
            margin-bottom: 10px;
            color: #ffffff;
        }

        /* BOTONES */
        button {
            padding: 16px 32px;
            margin: 10px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(45deg, var(--primary-neon), var(--secondary-neon));
            color: white;
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(188, 19, 254, 0.5);
        }

        button:active { transform: scale(0.95); }

        /* GALERÍA */
        .gallery img {
            width: 130px;
            height: 130px;
            object-fit: cover;
            border-radius: 12px;
            border: 2px solid var(--secondary-neon);
            margin: 5px;
        }

        /* JUEGO */
        .heart {
            position: absolute;
            font-size: 40px;
            z-index: 100;
            cursor: pointer;
            animation: fall 3s linear forwards;
        }

        @keyframes fall {
            from { top: -10%; }
            to { top: 110%; }
        }

        #msg-display {
            font-weight: 700;
            color: var(--secondary-neon);
            margin: 20px 0;
            min-height: 30px;
        }
    </style>
</head>
<body>

    <div class="background-overlay"></div>

    <div class="screen active" id="s0">
        <h1 class="neon-title">CASTILLO 💜</h1>
        <button onclick="goTo(1)">DARLE PLAY</button>
    </div>

    <div class="screen" id="s1">
        <h2 class="neon-subtitle">¿Cómo va el mood? 😏</h2>
        <div>
            <button onclick="setMsg('⚽ ¡América hasta la muerte! 🔥')">⚽</button>
            <button onclick="setMsg('😂 TikTokera nivel pro 💃')">😂</button>
            <button onclick="setMsg('😡 Pero así te quiero 😜')">😡</button>
        </div>
        <p id="msg-display"></p>
        <button onclick="goTo(2)" style="background:none; border: 1px solid white;">SIGUIENTE</button>
    </div>

    <div class="screen" id="s2">
        <h2 class="neon-subtitle">🎮 ATRAPA LOS 💜</h2>
        <p class="readable-text">Puntos: <span id="score" style="color:var(--secondary-neon); font-size:1.5rem;">0</span></p>
        <button id="play-btn" onclick="startHearts()">EMPEZAR JUEGO</button>
        <button onclick="goTo(3)" style="background:none; border: 1px solid white;">CONTINUAR</button>
    </div>

    <div class="screen" id="s3">
        <h2 class="neon-subtitle">📸 RECUERDOS</h2>
        <div class="gallery">
            <img src="miko2.png" onerror="this.src='https://via.placeholder.com/150/bc13fe/ffffff?text=FOTO+1'">
            <img src="miko3.png" onerror="this.src='https://via.placeholder.com/150/00ffff/000000?text=FOTO+2'">
            <img src="miko4.png" onerror="this.src='https://via.placeholder.com/150/ffffff/bc13fe?text=FOTO+3'">

        </div>
        <button onclick="playAudio()">🎤 ESCUCHAR</button>
        <button onclick="finalSequence()">LO ÚLTIMO</button>
    </div>

    <div class="screen" id="s4">
        <h1 class="neon-title">PARA TI 💜</h1>
        <div id="final-content" style="max-width: 500px;"></div>
    </div>

    <audio id="audio" src="mikoWassup.mp3"></audio>

<script>
    function goTo(index) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('s' + index).classList.add('active');
    }

    function setMsg(txt) {
        document.getElementById('msg-display').innerText = txt;
    }

    let score = 0;
    function startHearts() {
        document.getElementById('play-btn').style.display = 'none';
        let count = 0;
        const game = setInterval(() => {
            const h = document.createElement('div');
            h.className = 'heart';
            h.innerText = '💜';
            h.style.left = Math.random() * 80 + 10 + '%';
            h.onclick = () => { score++; document.getElementById('score').innerText = score; h.remove(); };
            document.body.appendChild(h);
            count++;
            if(count > 25) clearInterval(game);
            setTimeout(() => h.remove(), 3000);
        }, 400);
    }

    function playAudio() {
        document.getElementById('audio').play().catch(() => alert("Toca de nuevo para el audio"));
    }

    function finalSequence() {
        goTo(4);
        const container = document.getElementById('final-content');
        container.innerHTML = "";

        const textParts = [
            { text: "¡Feliz Cumpleaños! 💜\n\n", type: "title" },
            { text: "CASTILLO\n\n", type: "subtitle" },
            { text: "Sé que no eres de muchos abrazos...\npero eres de las personas más importantes en mi vida.\n\n", type: "body" },
            { text: "Gracias por todo lo compartido.\n\n", type: "body" },
            { text: "Te quiero un chingo 😎🔥", type: "body" }
        ];

        let pIdx = 0; let cIdx = 0;
        function type() {
            if (pIdx < textParts.length) {
                if (cIdx === 0) {
                    const el = document.createElement('p');
                    if(textParts[pIdx].type === 'title') el.className = 'neon-subtitle';
                    else if(textParts[pIdx].type === 'subtitle') el.style = "font-weight:700; font-size:1.8rem; color:var(--secondary-neon);";
                    else el.className = 'readable-text';
                    el.style.whiteSpace = "pre-line";
                    container.appendChild(el);
                }
                container.lastChild.innerText += textParts[pIdx].text.charAt(cIdx);
                cIdx++;
                if (cIdx >= textParts[pIdx].text.length) { pIdx++; cIdx = 0; setTimeout(type, 300); }
                else { setTimeout(type, 40); }
            }
        }
        setTimeout(type, 800);
    }
</script>
</body>
</html>
